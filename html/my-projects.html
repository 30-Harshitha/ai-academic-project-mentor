<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Workspace Registry</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
        --bg-main: #0a0a0c;
        --bg-card: #121214;
        --accent: #d4ff00; /* Signature Neon Yellow */
        --accent-muted: rgba(212, 255, 0, 0.1);
        --text-main: #ffffff;
        --text-muted: #94a3b8;
        --border: #27272a;
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        padding-bottom: 60px;
    }

    /* Top App Header Layout */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px 0;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--border);
    }

    .logo {
        font-family: monospace;
        font-weight: 800;
        letter-spacing: 2px;
        font-size: 15px;
        color: var(--text-main);
        text-decoration: none;
    }

    .logo span {
        color: var(--text-muted);
        font-weight: 400;
    }

    .close-icon {
        color: var(--text-main);
        cursor: pointer;
        font-size: 20px;
        transition: color 0.2s;
    }
    .close-icon:hover { color: var(--accent); }

    /* Structural Feature Cards */
    .card-os {
        background-color: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
        margin-bottom: 20px;
    }

    .card-os h2, .card-os h5 {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--text-main);
        letter-spacing: -0.5px;
    }

    /* Minimal Metric Grid Display */
    .metric-num {
        font-size: 36px;
        font-weight: 800;
        color: var(--accent);
        font-family: monospace;
        margin: 0;
    }

    /* Dynamic Pipeline Table Elements */
    .table-os {
        width: 100%;
        color: var(--text-main);
        border-collapse: collapse;
        margin-bottom: 0;
    }
    .table-os th {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        padding: 12px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
    }
    .table-os td {
        padding: 14px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        color: var(--text-muted);
    }
    .table-os tr:last-child td {
        border-bottom: none;
    }
    .table-os strong {
        color: var(--text-main);
    }

    /* STUDENT/OS Accent Action Buttons */
    .btn-accent {
        background-color: var(--accent);
        color: #000000;
        font-weight: 700;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        transition: opacity 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    .btn-accent:hover { opacity: 0.95; color: #000; }

    .btn-outline-darkos {
        background-color: transparent;
        color: var(--text-main);
        border: 1px solid var(--border);
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        transition: background 0.2s;
    }
    .btn-outline-darkos:hover {
        background-color: var(--border);
        color: var(--text-main);
    }

    /* Modal Component Configuration Overrides */
    .modal-os-content {
        background-color: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-main);
        border-radius: 14px;
    }
    .modal-os-header {
        border-bottom: 1px solid var(--border);
    }
    .modal-os-footer {
        border-top: 1px solid var(--border);
    }

    footer {
        text-align: center;
        color: var(--text-muted);
        font-size: 12px;
        margin-top: 60px;
    }
  </style>
</head>

<body>

  <div class="container" style="max-width: 960px;">
    
    <header>
      <a href="dashboard.html" class="logo">STUDENT/OS <span>v1.0</span></a>
      <div class="close-icon" onclick="history.back()">✕</div>
    </header>

    <main>
        <div class="mb-4">
            <h2 class="fw-bold text-white mb-1" style="font-size: 24px; letter-spacing: -0.5px;">My Project Submissions</h2>
            <p style="color: var(--text-muted); font-size: 14px;">View and track all active submitted workspace configurations.</p>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card-os">
                    <h5>Total Projects</h5>
                    <div class="metric-num" id="projectCount">0</div>
                </div>
            </div>
        </div>

        <div id="projectsContainer">
            </div>

        <div id="noProjects" class="card-os text-center py-5 d-none">
            <i class="fas fa-folder-open fa-3x mb-3" style="color: var(--border)"></i>
            <h4 class="fw-bold text-white mb-2" style="font-size:18px;">No Projects Submitted</h4>
            <p class="small mb-4" style="color: var(--text-muted); max-width: 320px; margin: 0 auto;">You haven't initialized or registered any project layout templates yet.</p>
            <a href="submit-project.html" class="btn btn-accent mx-auto">
                Submit Your First Project <i class="fas fa-plus"></i>
            </a>
        </div>
    </main>

    
  </div>

  <div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content modal-os-content">
            <div class="modal-header modal-os-header py-3">
                <h5 class="modal-title fw-bold text-white m-0" style="font-size:16px;"><i class="fas fa-folder me-2" style="color: var(--accent);"></i>Project Specification Data Matrix</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <table class="table-os">
                    <tbody id="projectDetails">
                        </tbody>
                </table>
            </div>
            <div class="modal-os-footer p-3 d-flex justify-content-end">
                <button type="button" class="btn btn-outline-darkos text-white" data-bs-dismiss="modal">Close Workspace View</button>
            </div>
        </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/app.js"></script>
  <script src="js/my-projects.js"></script>

</body>
</html>
